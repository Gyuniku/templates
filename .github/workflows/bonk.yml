name: Bonk

# NOTE: before enabling widely, pin the action to a commit SHA instead of @main
# (third-party action runs with pull-requests: write). Replace `@main` below.

on:
  # Mention-driven: /bonk or @ask-bonk in comments and PR line comments.
  # These events always run in the base-repo (trusted) context, so secrets are
  # available even for PRs opened from forks.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # Auto-review PRs on open/update. Secrets are NOT available to fork PRs on this
  # event, so the auto-review job below is gated to same-repo (internal) PRs.
  # Fork PRs get a review when a maintainer (or the author) types /bonk.
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Answer mentions (/bonk, @ask-bonk). Comment-only, never pushes code.
  bonk-mention:
    if: >-
      github.event_name != 'pull_request' &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bonk
        uses: ask-bonk/ask-bonk/github@main
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: "opencode/claude-opus-4-5"
          mentions: "/bonk,@ask-bonk"
          token_permissions: NO_PUSH

  # First-pass review on internal PRs. Comment-only, never pushes code.
  # Gated to same-repo PRs because fork PRs don't receive secrets on this event.
  bonk-auto-review:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bonk review
        uses: ask-bonk/ask-bonk/github@main
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: "opencode/claude-opus-4-5"
          token_permissions: NO_PUSH
          prompt: |
            Review this pull request to cloudflare/templates.
            CONTRIBUTING.md has the rules. AGENTS.md has the common bugs.
            Post a short review with inline comments where you can.

            Check:
            - Folder name ends in -template and matches package.json and wrangler.json(c).
            - package.json has: description, scripts.dev, scripts.deploy, private:true,
              no version field, and a cloudflare object with label, products (max 3),
              and categories. If cloudflare.publish is true, it also needs
              preview_image_url and preview_icon_url.
            - Uses wrangler.json or wrangler.jsonc, not wrangler.toml. Bindings are top-level.
            - README has a Deploy to Cloudflare button at the very top.
            - README has the dash-content-start and dash-content-end markers, and the
              text between them has no shell commands.
            - At least 5 real vitest tests, plus a Playwright test in playwright-tests/.
              Call out fake or placeholder tests.
            - Name describes what the template does, not the tech.
            - Common bugs: checks that run after fetch instead of before, bindings read
              from global instead of env, manual path routing instead of a router.

            Skip anything the linter already checks unless it is failing.
            Do not approve and do not block. A human does that. If it looks good, say so
            and list what only a human can do (upload preview image, set publish flag).
